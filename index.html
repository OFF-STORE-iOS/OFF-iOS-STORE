<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFF iOS - المتجر</title>
    <style>
        body { background: #000; color: #fff; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .card { border: 2px solid #00eaff; padding: 25px; border-radius: 20px; display: inline-block; background: #111; box-shadow: 0 0 20px #00eaff; }
        .btn { display: block; background: #00eaff; color: #000; padding: 15px; margin: 20px 0; border-radius: 12px; text-decoration: none; font-weight: bold; }
        .byte { color: #00ff00; font-family: monospace; font-size: 18px; border: 1px dashed #444; padding: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color:#00eaff;">🔥 OFF iOS 🔥</h1>
        <p>أهلاً بك في موقعي الرسمي</p>
        <hr style="border: 0.5px solid #333;">
        <a href="#" class="btn">تحميل ببجي IPA الأصلية</a>
        <p>سكربت تصفير حماية البايت:</p>
        <div class="byte">20 00 80 D2</div>
        <p style="font-size: 12px; color: #666; margin-top: 20px;">تم التطوير بواسطة OFF iOS</p>
    </div>
</body>
</html>
